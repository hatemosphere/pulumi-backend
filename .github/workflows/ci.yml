name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  packages: write
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Unit tests
        run: gotestsum --junitfile unit-results.xml -- -v -timeout 120s ./internal/... -count=1

      - name: Test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6.3.1
        if: always()
        with:
          report_paths: unit-results.xml
          check_name: Unit Test Results
          include_passed: true
          detailed_summary: true
          job_summary: true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: unit-test-results
          path: unit-results.xml

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Fetch Pulumi reference source
        run: |
          python - <<'PY'
          import json, pathlib, subprocess
          snap = json.loads(pathlib.Path("tests/testdata/pulumi_http_contract.json").read_text())
          commit = snap.get("pulumiGitCommit")
          if not commit:
              raise SystemExit("pulumiGitCommit missing from tests/testdata/pulumi_http_contract.json")
          subprocess.run(["git", "clone", "--no-checkout", "https://github.com/pulumi/pulumi.git", "reference/pulumi"], check=True)
          subprocess.run(["git", "-C", "reference/pulumi", "checkout", commit], check=True)
          PY

      - name: Download upstream spec
        run: curl -sfo pulumi-spec.json https://api.pulumi.com/api/openapi/pulumi-spec.json

      - name: HTTP API and spec compliance tests
        run: >-
          gotestsum --junitfile api-results.xml --
          -v -timeout 120s ./tests/ -count=1
          -run '^(TestOpenAPISpecSelfConsistency|TestAPISpecCoverage|TestAPISpecSchemaCompliance|TestDeclaredErrorCodesExercised|TestDeclaredErrorCodesCoverage|TestPulumiHTTPContractSnapshotUpToDate)$'

      - name: Test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6.3.1
        if: always()
        with:
          report_paths: api-results.xml
          check_name: API Test Results
          include_passed: true
          detailed_summary: true
          job_summary: true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: api-test-results
          path: api-results.xml

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - uses: pulumi/setup-pulumi@b374ceb6168550de27c6eba92e01c1a774040e11 # v2.0.0
        with:
          pulumi-version: 3.228.0

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Download upstream spec
        run: curl -sfo pulumi-spec.json https://api.pulumi.com/api/openapi/pulumi-spec.json

      - name: Full integration tests
        run: gotestsum --junitfile cli-results.xml -- -v -timeout 600s ./tests/ -count=1

      - name: Test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6.3.1
        if: always()
        with:
          report_paths: cli-results.xml
          check_name: CLI Test Results
          include_passed: true
          detailed_summary: true
          job_summary: true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cli-test-results
          path: cli-results.xml

  test-cli-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pulumi-version: ["3.210.0", "3.220.0", "3.225.1", "3.228.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - uses: pulumi/setup-pulumi@b374ceb6168550de27c6eba92e01c1a774040e11 # v2.0.0
        with:
          pulumi-version: ${{ matrix.pulumi-version }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: CLI compatibility smoke tests
        run: >-
          gotestsum --junitfile cli-compat-${{ matrix.pulumi-version }}.xml --
          -v -timeout 180s ./tests/ -count=1 -run '^TestCLICompat_'

      - name: Test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6.3.1
        if: always()
        with:
          report_paths: cli-compat-${{ matrix.pulumi-version }}.xml
          check_name: CLI Compat (${{ matrix.pulumi-version }})
          include_passed: true
          detailed_summary: true
          job_summary: true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cli-compat-${{ matrix.pulumi-version }}
          path: cli-compat-${{ matrix.pulumi-version }}.xml

  verify-compat-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Fetch Pulumi reference source
        run: |
          python - <<'PY'
          import json, pathlib, subprocess
          snap = json.loads(pathlib.Path("tests/testdata/pulumi_http_contract.json").read_text())
          commit = snap.get("pulumiGitCommit")
          if not commit:
              raise SystemExit("pulumiGitCommit missing from tests/testdata/pulumi_http_contract.json")
          subprocess.run(["git", "clone", "--no-checkout", "https://github.com/pulumi/pulumi.git", "reference/pulumi"], check=True)
          subprocess.run(["git", "-C", "reference/pulumi", "checkout", commit], check=True)
          PY

      - name: Refresh vendored Pulumi HTTP contract snapshot
        run: go run ./cmd/dump-pulumi-http-contract

      - name: Refresh CLI compatibility matrix and README badges
        run: go run ./cmd/run-cli-compat-matrix

      - name: Verify generated compatibility metadata is committed
        run: git diff --exit-code -- README.md tests/testdata/cli_compat_matrix.json tests/testdata/pulumi_http_contract.json

  docker-publish:
    needs: [build, lint, test-unit, test-api, test-integration, test-cli-compat, verify-compat-metadata]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.vars.outputs.sha_short }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
